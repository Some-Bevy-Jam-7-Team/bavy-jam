name: CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yaml'
  push:
    branches: [main, dev]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-C debuginfo=0"
  # Use the same Rust toolchain across jobs so they can share a cache.
  toolchain: nightly-2026-03-02

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustc-codegen-cranelift-preview
          toolchain: ${{ env.toolchain }}

      - &ld_library_path
        name: Set LD_LIBRARY_PATH
        id: ld_library_path
        run: |
          # Setting LD_LIBRARY_PATH is a workaround for <https://github.com/TheBevyFlock/bevy_new_2d/pull/318#issuecomment-2585935350>.
          echo "LD_LIBRARY_PATH=$(rustc --print target-libdir)" >> $GITHUB_ENV

      - name: Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          shared-key: "ci"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-directories: ${{ env.LD_LIBRARY_PATH }}

      - &install_deps
        name: Dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - &cranelift
        name: Cranelift
        run: rustup component add rustc-codegen-cranelift-preview --toolchain ${{ env.toolchain }}

      - &cargo_config
        name: Cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - &binstall
        name: Binstall
        uses: cargo-bins/cargo-binstall@main

      - &wild
        name: Wild
        run: cargo binstall wild-linker --locked --force

      - name: Nextest
        run: cargo binstall cargo-nextest --locked --force

      - name: Tests
        run: cargo nextest run --locked --workspace --all-targets --no-fail-fast --no-tests warn

      - name: Doctests
        run: cargo test --locked --workspace --doc
        # Fails without `lib.rs`
        continue-on-error: true

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - *checkout
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: ${{ env.toolchain }}
          components: clippy, rustc-codegen-cranelift-preview

      - *ld_library_path

      - name: Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          shared-key: "ci"
          save-if: false
          cache-directories: ${{ env.LD_LIBRARY_PATH }}

      - *install_deps
      - *cranelift
      - *cargo_config
      - *binstall
      - *wild

      - name: Run clippy
        run: cargo clippy -- -D warnings

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - *checkout

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: ${{ env.toolchain }}
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check



